server {
    listen 80;
    
    # Where your React build files are located
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This is the magic line!
        # It says: try the exact URI, then try it as a directory, 
        # and if neither exist, just serve index.html.
        try_files $uri $uri/ /index.html;
    }
}