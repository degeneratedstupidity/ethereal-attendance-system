# projects/docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./attendance-management-system
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/attendance_db
      - SECRET_KEY=your_super_secret_production_key_here
    depends_on:
      - db

  frontend:
    build:
      context: ./attendance-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
